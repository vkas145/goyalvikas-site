<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ch 1: Numbers & Numeration • Vivaan's Quiz</title>
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-N5BNNVFL');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0c29;--accent:#f7c948;--green:#22d67a;--red:#ff5e5e;--blue:#4fc3f7;--purple:#b39ddb;--card:rgba(255,255,255,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(1px 1px at 12% 20%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 78% 14%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 44% 68%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 91% 78%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 25% 92%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 60% 40%,rgba(255,255,255,.4) 0%,transparent 100%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:14px 14px 90px}

/* Top nav */
.topnav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.back-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:7px 16px;font-size:13px;font-weight:700;color:#b0aed0;cursor:pointer;font-family:'Nunito',sans-serif;text-decoration:none;transition:all .2s}
.back-btn:hover{background:rgba(247,201,72,.15);color:var(--accent)}
.topnav-title{font-size:14px;font-weight:800;color:var(--accent);flex:1;text-align:center}
.timer-pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:6px 14px;font-size:13px;font-weight:900;color:var(--accent)}

/* Level toggle */
.level-row{display:flex;justify-content:center;gap:0;margin-bottom:14px}
.level-toggle{display:flex;border:2px solid rgba(255,255,255,.12);border-radius:50px;overflow:hidden}
.lvl-btn{padding:8px 22px;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;color:#b0aed0;font-family:'Nunito',sans-serif;background:rgba(255,255,255,.05);border:none}
.lvl-btn.beg.active{background:var(--blue);color:#0f0c29}
.lvl-btn.pro.active{background:var(--red);color:#fff}

/* Set pills */
.set-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.set-pill{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:50px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;color:#b0aed0;font-family:'Nunito',sans-serif;transition:all .2s}
.set-pill.active{background:var(--accent);border-color:var(--accent);color:#0f0c29}
.set-pill.done{border-color:var(--green);color:var(--green);background:rgba(34,214,122,.1)}
.set-pill.done.active{background:var(--green);color:#0f0c29}

/* Layout */
.quiz-layout{display:flex;gap:12px;align-items:flex-start}
.sidebar{flex-shrink:0;width:40px;display:flex;flex-direction:column;gap:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:9px 4px}
.qb{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:rgba(255,255,255,.3);transition:all .3s}
.qb.cur{border-color:var(--accent);color:var(--accent);background:rgba(247,201,72,.12);animation:qpulse 1.2s infinite}
.qb.ok{background:rgba(34,214,122,.2);border-color:var(--green);color:var(--green)}
.qb.no{background:rgba(255,94,94,.2);border-color:var(--red);color:var(--red)}
@keyframes qpulse{0%,100%{box-shadow:0 0 0 0 rgba(247,201,72,.4)}50%{box-shadow:0 0 0 5px rgba(247,201,72,0)}}

/* Quiz card */
.qcard{flex:1;min-width:0;background:var(--card);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:20px 16px}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.topic-tag{background:rgba(179,157,219,.2);border:1px solid rgba(179,157,219,.35);border-radius:50px;padding:3px 10px;font-size:10px;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.6px}
.score-badge{background:rgba(34,214,122,.12);border:1px solid rgba(34,214,122,.3);border-radius:50px;padding:4px 12px;font-size:12px;font-weight:800;color:var(--green)}
.pbar-wrap{background:rgba(255,255,255,.08);border-radius:50px;height:6px;margin-bottom:16px;overflow:hidden}
.pbar{height:100%;background:linear-gradient(90deg,var(--accent),#ff9f43);border-radius:50px;transition:width .4s}
.qnum{font-size:10px;font-weight:700;color:#8884b0;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.qtext{font-size:clamp(15px,3.2vw,20px);font-weight:800;line-height:1.5;margin-bottom:16px;min-height:48px}

/* ── INTERACTION AREAS ─────────────────────────────── */
/* MCQ */
.mcq-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.mcq-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:13px 9px;font-size:14px;font-weight:800;color:#fff;cursor:pointer;transition:all .2s;text-align:center;font-family:'Nunito',sans-serif;line-height:1.35}
.mcq-btn:hover:not(:disabled){background:rgba(247,201,72,.15);border-color:var(--accent);transform:scale(1.03)}
.mcq-btn.correct{background:rgba(34,214,122,.25);border-color:var(--green);color:var(--green)}
.mcq-btn.wrong{background:rgba(255,94,94,.2);border-color:var(--red);color:var(--red)}
.mcq-btn:disabled{cursor:not-allowed}

/* True / False */
.tf-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.tf-btn{border:3px solid;border-radius:18px;padding:22px 10px;font-size:22px;font-weight:900;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;gap:4px}
.tf-btn.true-btn{background:rgba(34,214,122,.1);border-color:rgba(34,214,122,.4);color:var(--green)}
.tf-btn.false-btn{background:rgba(255,94,94,.1);border-color:rgba(255,94,94,.4);color:var(--red)}
.tf-btn:hover:not(:disabled){transform:scale(1.04)}
.tf-btn.selected-t{background:rgba(34,214,122,.35);border-color:var(--green)}
.tf-btn.selected-f{background:rgba(255,94,94,.35);border-color:var(--red)}
.tf-btn.result-correct{background:rgba(34,214,122,.4);border-color:var(--green);box-shadow:0 0 16px rgba(34,214,122,.4)}
.tf-btn.result-wrong{background:rgba(255,94,94,.3);border-color:var(--red)}
.tf-btn:disabled{cursor:not-allowed}
.tf-sub{font-size:12px;font-weight:700;opacity:.7}

/* Tap All */
.tapall-wrap{margin-bottom:12px}
.tapall-hint{font-size:12px;color:#8884b0;margin-bottom:8px;font-weight:600}
.tapall-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.ta-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 16px;font-size:16px;font-weight:800;cursor:pointer;color:#fff;font-family:'Nunito',sans-serif;transition:all .2s;min-width:56px;text-align:center}
.ta-btn.sel{background:rgba(247,201,72,.25);border-color:var(--accent);color:var(--accent);transform:scale(1.06)}
.ta-btn.correct{background:rgba(34,214,122,.3);border-color:var(--green);color:var(--green)}
.ta-btn.missed{background:rgba(255,165,0,.2);border-color:orange;color:orange}
.ta-btn.wrong{background:rgba(255,94,94,.2);border-color:var(--red);color:var(--red)}
.ta-btn:disabled{cursor:not-allowed}
.check-btn{width:100%;padding:11px;background:rgba(247,201,72,.15);border:2px solid var(--accent);color:var(--accent);font-size:14px;font-weight:900;border-radius:12px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
.check-btn:hover:not(:disabled){background:var(--accent);color:#0f0c29}
.check-btn:disabled{opacity:.5;cursor:not-allowed}

/* Sort */
.sort-wrap{margin-bottom:12px}
.sort-instruction{font-size:12px;color:#8884b0;font-weight:700;margin-bottom:8px;text-align:center}
.sort-slots{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.sort-slot{width:60px;height:50px;border:2px dashed rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:rgba(255,255,255,.3);background:rgba(255,255,255,.04);transition:all .3s;position:relative}
.sort-slot .slot-num{position:absolute;top:2px;left:5px;font-size:9px;color:rgba(255,255,255,.3)}
.sort-slot.filled{border-style:solid;border-color:var(--accent);color:var(--accent);background:rgba(247,201,72,.1)}
.sort-slot.correct{border-color:var(--green);color:var(--green);background:rgba(34,214,122,.15)}
.sort-slot.wrong{border-color:var(--red);color:var(--red);background:rgba(255,94,94,.1)}
.sort-tiles{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.sort-tile{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);border-radius:12px;padding:10px 14px;font-size:15px;font-weight:800;cursor:pointer;color:#fff;font-family:'Nunito',sans-serif;transition:all .2s;min-width:56px;text-align:center}
.sort-tile:hover:not(:disabled){background:rgba(247,201,72,.15);border-color:var(--accent)}
.sort-tile.used{opacity:.3;cursor:not-allowed}
.sort-tile:disabled{cursor:not-allowed}

/* Fill Blank */
.fillin-wrap{margin-bottom:12px}
.fillin-expr{font-size:clamp(18px,4vw,26px);font-weight:900;text-align:center;padding:16px;background:rgba(255,255,255,.06);border-radius:14px;margin-bottom:12px;letter-spacing:1px}
.fillin-blank{display:inline-block;border-bottom:3px solid var(--accent);min-width:60px;color:var(--accent);font-size:clamp(18px,4vw,26px)}
.fillin-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fi-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:12px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;text-align:center}
.fi-btn:hover:not(:disabled){background:rgba(247,201,72,.15);border-color:var(--accent);transform:scale(1.04)}
.fi-btn.correct{background:rgba(34,214,122,.25);border-color:var(--green);color:var(--green)}
.fi-btn.wrong{background:rgba(255,94,94,.2);border-color:var(--red);color:var(--red)}
.fi-btn:disabled{cursor:not-allowed}

/* Abacus */
.abacus-frame{background:linear-gradient(135deg,#1a0e3a,#0e0828);border:3px solid #6B3A2A;border-radius:14px;padding:16px 24px;display:flex;justify-content:center;gap:28px;margin-bottom:14px;position:relative}
.abacus-frame::before,.abacus-frame::after{content:'';position:absolute;left:12px;right:12px;height:4px;background:#6B3A2A;border-radius:2px}
.abacus-frame::before{top:22px}
.abacus-frame::after{bottom:38px}
.ab-rod-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.ab-rod-bar{position:absolute;top:0;bottom:24px;width:4px;background:rgba(255,255,255,.25);border-radius:2px}
.ab-bead{width:30px;height:30px;border-radius:50%;position:relative;z-index:2;transition:all .2s;flex-shrink:0}
.ab-bead.H.on{background:radial-gradient(circle at 35% 35%,#ffe97a,#e6b800);box-shadow:0 2px 8px rgba(247,201,72,.5)}
.ab-bead.T.on{background:radial-gradient(circle at 35% 35%,#7ad8ff,#2196F3);box-shadow:0 2px 8px rgba(79,195,247,.5)}
.ab-bead.O.on{background:radial-gradient(circle at 35% 35%,#6fffc0,#16a86a);box-shadow:0 2px 8px rgba(34,214,122,.5)}
.ab-bead.off{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
.ab-rod-label{font-size:11px;font-weight:800;color:#8884b0;text-transform:uppercase;margin-top:5px;position:relative;z-index:2}

/* Type answer */
.typeans-wrap{margin-bottom:12px}
.type-display{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:16px;text-align:center;font-size:28px;font-weight:900;color:var(--accent);min-height:64px;letter-spacing:4px;margin-bottom:10px;transition:border-color .2s}
.type-display.has-val{border-color:rgba(247,201,72,.4)}
.numpad{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}
.np-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.12);border-radius:12px;padding:13px 6px;font-size:18px;font-weight:800;cursor:pointer;color:#fff;font-family:'Nunito',sans-serif;transition:all .15s;text-align:center}
.np-btn:hover:not(:disabled){background:rgba(247,201,72,.2);border-color:var(--accent);color:var(--accent)}
.np-btn.clr{color:var(--red);border-color:rgba(255,94,94,.3)}
.np-btn.back{color:#8884b0}
.np-btn.go{background:linear-gradient(135deg,var(--accent),#ff9f43);color:#0f0c29;border-color:var(--accent)}
.np-btn.go:hover{transform:scale(1.03)}
.np-btn:disabled{opacity:.4;cursor:not-allowed}

/* Character */
.char-panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.char-emo{font-size:44px;transition:transform .3s;line-height:1}
.char-emo.pop{animation:pop .4s ease}
.char-emo.shake{animation:shake .5s ease}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}
.char-text .cname{font-size:10px;font-weight:700;color:#8884b0;text-transform:uppercase;letter-spacing:.7px}
.char-text .cmood{font-size:15px;font-weight:900;margin:2px 0}
.char-text .cmsg{font-size:11px;color:#b0aed0;font-weight:600}
.neutral{color:#b0aed0}.ok-mood{color:var(--green)}.no-mood{color:var(--red)}

/* Feedback */
.feedback{text-align:center;font-size:15px;font-weight:900;padding:9px 14px;border-radius:12px;margin-bottom:10px;display:none}
.feedback.show{display:block;animation:popIn .3s}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.feedback.ok{background:rgba(34,214,122,.15);color:var(--green)}
.feedback.no{background:rgba(255,94,94,.1);color:var(--red)}

/* Next btn */
.next-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#ff9f43);color:#0f0c29;font-size:15px;font-weight:900;border:none;border-radius:14px;cursor:pointer;font-family:'Nunito',sans-serif;display:none;transition:transform .15s}
.next-btn.show{display:block;animation:popIn .3s}
.next-btn:hover{transform:translateY(-2px)}

/* Result */
.result-screen{display:none;text-align:center;padding:8px 0}
.result-screen.show{display:block;animation:popIn .4s}
.res-char{font-size:58px;display:block;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.res-score{font-size:44px;font-weight:900;color:var(--accent);line-height:1}
.res-stars{font-size:26px;letter-spacing:4px;margin:8px 0}
.res-msg{font-size:15px;font-weight:700;margin-bottom:4px}
.res-time{font-size:11px;color:#8884b0;margin-bottom:16px}
.res-btns{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.res-btn{border:none;border-radius:12px;padding:11px 22px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.res-btn.retry{background:linear-gradient(135deg,var(--blue),#7986cb);color:#fff}
.res-btn.next{background:linear-gradient(135deg,var(--green),#00b09b);color:#fff}

/* Floating scoreboard */
.fab{position:fixed;bottom:20px;right:20px;z-index:100;background:linear-gradient(135deg,var(--accent),#ff9f43);color:#0f0c29;border:none;border-radius:50px;padding:10px 17px;font-size:13px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 18px rgba(247,201,72,.4);display:flex;align-items:center;gap:6px}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.show{display:flex}
.modal-box{background:#1a1740;border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:20px 16px;width:100%;max-width:460px;max-height:80vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif}
.modal-title{font-size:18px;font-weight:900;color:var(--accent);margin-bottom:12px}
.modal-lvl-row{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.mf-btn{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:50px;padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer;color:#b0aed0;font-family:'Nunito',sans-serif;transition:all .2s}
.mf-btn.active{background:var(--accent);border-color:var(--accent);color:#0f0c29}
.score-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:9px 13px;margin-bottom:7px}
.sr-lbl{font-size:12px;color:#fff;font-weight:700}.sr-sub{font-size:10px;color:#8884b0}
.sr-score{font-size:17px;font-weight:900;color:var(--accent)}.sr-stars{font-size:12px}
.score-row.perfect .sr-score{color:var(--green)}
.empty-msg{font-size:12px;color:#8884b0;text-align:center;padding:18px}

#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}

@media(max-width:540px){
  .quiz-layout{flex-direction:column}
  .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:7px;gap:4px;justify-content:center}
  .qb{width:28px;height:28px;font-size:9px}
  .mcq-grid{grid-template-columns:1fr 1fr}
  .qcard{padding:14px 12px}
  .tf-btn{padding:16px 8px;font-size:18px}
}
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N5BNNVFL" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<canvas id="confetti-canvas"></canvas>

<div class="wrap">

  <!-- Top nav -->
  <div class="topnav">
    <a href="./index.html" class="back-btn">← Hub</a>
    <div class="topnav-title">Ch 1: Numbers &amp; Numeration</div>
    <div class="timer-pill">⏱ <span id="timerDisplay">0:00</span></div>
  </div>

  <!-- Level toggle -->
  <div class="level-row">
    <div class="level-toggle">
      <button class="lvl-btn beg active" id="btnBeg" onclick="switchLevel('beginner')">⭐ Beginner</button>
      <button class="lvl-btn pro" id="btnPro" onclick="switchLevel('pro')">🔥 Pro</button>
    </div>
  </div>

  <!-- Set pills -->
  <div class="set-row" id="setRow"></div>

  <!-- Layout -->
  <div class="quiz-layout">
    <div class="sidebar" id="sidebar"></div>

    <div style="flex:1;min-width:0">
      <div class="qcard" id="qcard">
        <div class="card-meta">
          <span class="topic-tag" id="topicTag">Topic</span>
          <span class="score-badge">✅ <span id="liveScore">0</span> / <span id="totalQ">12</span></span>
        </div>
        <div class="pbar-wrap"><div class="pbar" id="pbar" style="width:0%"></div></div>

        <div id="quizBody">
          <div class="qnum" id="qnum">Question 1</div>
          <div class="qtext" id="qtext"></div>
          <div id="interactionArea"></div>
          <div class="char-panel">
            <div class="char-emo" id="charEmo"></div>
            <div class="char-text">
              <div class="cname" id="charName"></div>
              <div class="cmood neutral" id="charMood">Waiting...</div>

  const el=document.getElementById('setRow');el.innerHTML='';

    const btn=document.createElement('button');
    btn.className='set-pill'+(i===setIdx?' active':'')+(saved?' done':'');
    btn.textContent=`Set ${i+1}${saved?' ✓':''}`;
    btn.onclick=()=>{setIdx=i;buildSetRow();startSet();};
    el.appendChild(btn);
  });
}

    const b=document.createElement('div');

    el.appendChild(b);
  }
}

  for(let i=0;i<totalQ();i++){
    const b=document.getElementById(`qb${i}`);if(!b)continue;

    else if(results[i]==='no')b.classList.add('no');
    else if(i===qIdx)b.classList.add('cur');
  }
}

  buildSidebar();renderQ();startTimer();
  document.getElementById('liveScore').textContent='0';
  document.getElementById('pbar').style.width='0%';
  setCharNeutral();
}

function renderQ(){
  const q=curQ();answered=false;
  document.getElementById('topicTag').textContent=q.topic;
  document.getElementById('qnum').textContent=`Question ${qIdx+1} of ${totalQ()}`;
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
  updateSidebar();
  const area=document.getElementById('interactionArea');
  if(q.type==='mcq')area.innerHTML=renderMCQ(q);
  else if(q.type==='tf')area.innerHTML=renderTF();
  else if(q.type==='tapall')area.innerHTML=renderTapAll(q);
  else if(q.type==='sort')area.innerHTML=renderSort(q);
  else if(q.type==='fillin')area.innerHTML=renderFillIn(q);
  else if(q.type==='abacus')area.innerHTML=renderAbacusQ(q);
  else if(q.type==='typeans')area.innerHTML=renderTypeAns();
  setCharNeutral();
}

// ─── MCQ ──────────────────────────────────────────────────────
function renderMCQ(q){
  const correct=q.o[q.a];
  const sh=shuffle(q.o);
  const ci=sh.indexOf(correct);
  let h=`<div class="mcq-grid">`;
  sh.forEach((opt,i)=>{
    h+=`<button class="mcq-btn" onclick="answerMCQ(this,${i==ci},'${correct.replace(/'/g,"\\'")}',${ci})">${opt}</button>`;
  });
  return h+`</div>`;
}
function answerMCQ(btn,isOk,correctText,correctIdx){
  if(answered)return;answered=true;
  const btns=document.querySelectorAll('.mcq-btn');
  btns.forEach(b=>b.disabled=true);
  btns[correctIdx].classList.add('correct');
  if(isOk){btn.classList.add('correct');finishQ(true);}
  else{btn.classList.add('wrong');finishQ(false,correctText);}
}

// ─── TRUE / FALSE ─────────────────────────────────────────────
function renderTF(){
  return`<div class="tf-wrap">
    <button class="tf-btn true-btn" onclick="answerTF(true,this)">✓<span class="tf-sub">TRUE</span></button>
    <button class="tf-btn false-btn" onclick="answerTF(false,this)">✗<span class="tf-sub">FALSE</span></button>
  </div>`;
}
function answerTF(val,btn){
  if(answered)return;answered=true;
  const q=curQ();
  document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
  const isOk=val===q.answer;
  if(isOk){btn.classList.add('result-correct');finishQ(true);}
  else{
    btn.classList.add('result-wrong');
    // highlight correct btn
    document.querySelectorAll('.tf-btn').forEach(b=>{
      if((q.answer&&b.classList.contains('true-btn'))||(!q.answer&&b.classList.contains('false-btn')))b.classList.add('result-correct');
    });
    finishQ(false,`Correct answer: ${q.answer?'TRUE':'FALSE'}`);
  }
}

  const sh=shuffle([...q.pool]);
  let h=`<div class="tapall-wrap">
    <div class="tapall-hint">Tap to select • Tap again to deselect</div>
    <div class="tapall-grid" id="tapGrid">`;
  sh.forEach(v=>{
    h+=`<button class="ta-btn" data-val="${v}" onclick="toggleTA(this,${v})">${v}</button>`;
  });
  h+=`</div><button class="check-btn" onclick="checkTapAll()">✓ Check My Answer</button></div>`;
  return h;
}
function toggleTA(btn,val){
  if(answered)return;
  if(tapAllSel.has(val)){tapAllSel.delete(val);btn.classList.remove('sel');}
  else{tapAllSel.add(val);btn.classList.add('sel');}
}
function checkTapAll(){
  if(answered)return;answered=true;
  const q=curQ();
  document.querySelectorAll('.ta-btn').forEach(b=>b.disabled=true);
  document.querySelector('.check-btn').disabled=true;
  const sel=[...tapAllSel];
  const isOk=q.correct.every(v=>tapAllSel.has(v))&&sel.every(v=>q.correct.includes(v));
  // colour each button
  document.querySelectorAll('.ta-btn').forEach(b=>{
    const v=parseInt(b.dataset.val);
    if(q.correct.includes(v)&&tapAllSel.has(v))b.classList.add('correct');
    else if(q.correct.includes(v)&&!tapAllSel.has(v))b.classList.add('missed');
    else if(!q.correct.includes(v)&&tapAllSel.has(v))b.classList.add('wrong');
    b.classList.remove('sel');
  });
  finishQ(isOk,isOk?null:`Correct: ${q.correct.join(', ')}`);
}

// ─── SORT ─────────────────────────────────────────────────────
function renderSort(q){
  sortSel=[];
  const sh=shuffle([...q.items]);
  const n=q.items.length;
  let h=`<div class="sort-wrap">
    <div class="sort-instruction">${q.order==='asc'?'⬆ Tap: Smallest → Largest':'⬇ Tap: Largest → Smallest'}</div>
    <div class="sort-slots" id="sortSlots">`;
  for(let i=0;i<n;i++)h+=`<div class="sort-slot" id="ss${i}"><span class="slot-num">${i+1}</span>?</div>`;
  h+=`</div><div class="sort-tiles" id="sortTiles">`;
  sh.forEach(v=>{h+=`<button class="sort-tile" data-v="${v}" onclick="tapSort(this,${v})">${v}</button>`;});
  h+=`</div><button class="check-btn" id="sortCheckBtn" style="display:none" onclick="checkSort()">✓ Check Order</button></div>`;
  return h;
}
function tapSort(btn,val){
  if(answered||btn.disabled)return;
  sortSel.push(val);btn.classList.add('used');btn.disabled=true;
  const slot=document.getElementById(`ss${sortSel.length-1}`);
  slot.textContent=val;slot.classList.add('filled');
  const q=curQ();
  if(sortSel.length===q.items.length)document.getElementById('sortCheckBtn').style.display='block';
}
function checkSort(){
  if(answered)return;answered=true;
  const q=curQ();
  const correct=[...q.items].sort((a,b)=>q.order==='asc'?a-b:b-a);
  const isOk=JSON.stringify(sortSel)===JSON.stringify(correct);
  document.getElementById('sortCheckBtn').disabled=true;
  q.items.forEach((_,i)=>{
    const slot=document.getElementById(`ss${i}`);
    if(!slot)return;
    slot.classList.remove('filled');
    slot.classList.add(sortSel[i]===correct[i]?'correct':'wrong');
  });
  finishQ(isOk,isOk?null:`Correct order: ${correct.join(' → ')}`);
}

// ─── FILL IN BLANK ────────────────────────────────────────────
function renderFillIn(q){
  const correct=q.o[q.a];
  const sh=shuffle(q.o);
  const ci=sh.indexOf(correct);
  // replace ___ in expr with styled blank
  const exprHtml=q.expr.replace(/___/g,`<span class="fillin-blank" id="fiBlank">___</span>`);
  let h=`<div class="fillin-wrap">
    <div class="fillin-expr">${exprHtml}</div>
    <div class="fillin-opts">`;
  sh.forEach((opt,i)=>{
    h+=`<button class="fi-btn" onclick="answerFillIn(this,${i===ci},'${opt.replace(/'/g,"\\'")}',${ci})">${opt}</button>`;
  });
  return h+`</div></div>`;
}
function answerFillIn(btn,isOk,val,ci){
  if(answered)return;answered=true;
  document.querySelectorAll('.fi-btn').forEach((b,i)=>{b.disabled=true;if(i===ci)b.classList.add('correct');});
  const blank=document.getElementById('fiBlank');
  if(blank){blank.textContent=val;blank.style.color=isOk?'var(--green)':'var(--red)';}
  if(!isOk)btn.classList.add('wrong');
  finishQ(isOk,isOk?null:`Answer: ${document.querySelectorAll('.fi-btn')[ci].textContent}`);
}

// ─── ABACUS ───────────────────────────────────────────────────
function renderAbacusQ(q){
  const MAX=9;
  let abHtml=`<div class="abacus-frame">`;
  [{v:q.h,cls:'H',lbl:'H'},{v:q.t,cls:'T',lbl:'T'},{v:q.o_val,cls:'O',lbl:'O'}].forEach(rod=>{
    abHtml+=`<div class="ab-rod-wrap"><div class="ab-rod-bar"></div>`;
    for(let i=0;i<MAX;i++){
      abHtml+=`<div class="ab-bead ${rod.cls} ${i<rod.v?'on':'off'}"></div>`;
    }
    abHtml+=`<div class="ab-rod-label">${rod.lbl}</div></div>`;
  });
  abHtml+=`</div>`;

  const correct=q.opts[q.a];
  const sh=shuffle([...q.opts]);
  const ci=sh.indexOf(correct);
  let h=abHtml+`<div class="mcq-grid">`;
  sh.forEach((opt,i)=>{
    h+=`<button class="mcq-btn" onclick="answerMCQ(this,${i===ci},'${correct}',${ci})">${opt}</button>`;
  });
  return h+`</div>`;
}

// ─── TYPE ANSWER ──────────────────────────────────────────────
function renderTypeAns(){
  typeVal='';
  return`<div class="typeans-wrap">
    <div class="type-display" id="typeDisplay">___</div>
    <div class="numpad">
      ${'123456789'.split('').map(d=>`<button class="np-btn" onclick="np('${d}')">${d}</button>`).join('')}
      <button class="np-btn clr" onclick="np('clear')">✗</button>
      <button class="np-btn" onclick="np('0')">0</button>
      <button class="np-btn back" onclick="np('back')">⌫</button>
      <button class="np-btn go" onclick="checkTypeAns()">✓</button>
    </div>
  </div>`;
}
function np(v){
  if(answered)return;
  if(v==='clear'){typeVal='';}
  else if(v==='back'){typeVal=typeVal.slice(0,-1);}
  else if(typeVal.length<6){typeVal+=v;}
  const d=document.getElementById('typeDisplay');
  if(d){d.textContent=typeVal||'___';d.className='type-display'+(typeVal?' has-val':'');}
}
function checkTypeAns(){
  if(answered||!typeVal)return;answered=true;
  const q=curQ();
  const isOk=typeVal.trim()===q.answer.trim();
  const d=document.getElementById('typeDisplay');
  if(d)d.style.color=isOk?'var(--green)':'var(--red)';
  document.querySelectorAll('.np-btn').forEach(b=>b.disabled=true);
  finishQ(isOk,isOk?null:`Correct answer: ${q.answer}`);
}

// ─── Finish question ──────────────────────────────────────────
function finishQ(isOk,hint){
  if(isOk){score++;results[qIdx]='ok';setCharHappy();}
  else{results[qIdx]='no';setCharSad();}
  document.getElementById('liveScore').textContent=score;
  document.getElementById('pbar').style.width=`${((qIdx+1)/totalQ())*100}%`;
  updateSidebar();
  const fb=document.getElementById('feedback');
  fb.className=`feedback ${isOk?'ok':'no'} show`;
  fb.textContent=isOk?'✅ Brilliant!':('❌ '+(hint||'Not quite!'));
  document.getElementById('nextBtn').className='next-btn show';
}

// ─── Next question ────────────────────────────────────────────
function nextQ(){
  if(qIdx<totalQ()-1){qIdx++;renderQ();}
  else showResult();
}

// ─── Result ───────────────────────────────────────────────────
function showResult(){
  stopTimer();
  const tq=totalQ();const pct=Math.round((score/tq)*100);
  const key=scoreKey(level,setIdx);
  localStorage.setItem(key,JSON.stringify({score,tq,pct,t:timerSecs}));
  buildSetRow();
  document.getElementById('quizBody').style.display='none';
  const rs=document.getElementById('resultScreen');rs.classList.add('show');
  document.getElementById('resChar').textContent=char.e;
  document.getElementById('resTrophy').textContent=pct>=90?'🏆':pct>=70?'🥈':'🥉';
  document.getElementById('resScore').textContent=score;
  document.getElementById('resStars').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  const m=Math.floor(timerSecs/60),s=timerSecs%60;
  document.getElementById('resTime').textContent=`Time: ${m}m ${s}s`;
  document.getElementById('resMsg').textContent=pct>=90?`GENIUS! ${char.n} is amazed! 🌟`:pct>=70?`Great job! ${char.n} is proud! 🎉`:`Keep practising! ${char.n} believes in you! 💪`;
  const hasNext=setIdx<SETS[level].length-1;
  document.getElementById('nextSetBtn').style.display=hasNext?'':'none';
  if(pct>=90)confetti();
}
function retrySet(){document.getElementById('resultScreen').classList.remove('show');document.getElementById('quizBody').style.display='block';startSet();}
function goNextSet(){setIdx++;buildSetRow();startSet();}

// ─── Character ────────────────────────────────────────────────
function setCharNeutral(){
  document.getElementById('charEmo').textContent=char.e;
  document.getElementById('charEmo').className='char-emo';
  document.getElementById('charName').textContent=char.n;
  document.getElementById('charMood').className='cmood neutral';
  document.getElementById('charMood').textContent='Waiting for your answer...';
  document.getElementById('charMsg').textContent='Give it your best! 💪';
}
function setCharHappy(){
  document.getElementById('charEmo').className='char-emo pop';
  document.getElementById('charMood').className='cmood ok-mood';
  document.getElementById('charMood').textContent='🎉 Amazing!';
  document.getElementById('charMsg').textContent=rand(char.y);
}
function setCharSad(){
  document.getElementById('charEmo').className='char-emo shake';
  document.getElementById('charMood').className='cmood no-mood';
  document.getElementById('charMood').textContent='😔 Oh no...';
  document.getElementById('charMsg').textContent=rand(char.x);
}

// ─── Scoreboard Modal ─────────────────────────────────────────
let modalLevel='beginner';
function openModal(){
  modalLevel=level;renderModalFilters();renderModalList();
  document.getElementById('modalOv').classList.add('show');
}
function closeModal(){document.getElementById('modalOv').classList.remove('show');}
function renderModalFilters(){
  const el=document.getElementById('modalFilters');el.innerHTML='';
  ['beginner','pro'].forEach(l=>{
    const b=document.createElement('button');
    b.className='mf-btn'+(l===modalLevel?' active':'');
    b.textContent=l==='beginner'?'⭐ Beginner':'🔥 Pro';
    b.onclick=()=>{modalLevel=l;renderModalFilters();renderModalList();};
    el.appendChild(b);
  });
}
function renderModalList(){
  const el=document.getElementById('modalList');el.innerHTML='';
  let found=false;
  SETS[modalLevel].forEach((_,i)=>{
    const raw=localStorage.getItem(scoreKey(modalLevel,i));
    if(!raw)return;found=true;
    const d=JSON.parse(raw);
    const stars=d.pct>=90?'⭐⭐⭐':d.pct>=70?'⭐⭐':'⭐';
    const m=Math.floor(d.t/60),s=d.t%60;
    const row=document.createElement('div');
    row.className='score-row'+(d.pct>=90?' perfect':'');
    row.innerHTML=`<div><div class="sr-lbl">Set ${i+1}</div><div class="sr-sub">${m}m ${s}s</div></div><div style="text-align:right"><div class="sr-score">${d.score}/${d.tq}</div><div class="sr-stars">${stars}</div></div>`;
    el.appendChild(row);
  });
  if(!found)el.innerHTML='<div class="empty-msg">No scores yet — start quizzing! 🚀</div>';
}
document.getElementById('modalOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ─── Confetti ─────────────────────────────────────────────────
function confetti(){
  const cv=document.getElementById('confetti-canvas');
  const ctx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;
  const ps=Array.from({length:110},()=>({x:Math.random()*cv.width,y:-20,r:Math.random()*6+3,c:`hsl(${Math.random()*360},90%,60%)`,vx:(Math.random()-.5)*4,vy:Math.random()*5+2,a:Math.random()*360}));
  let f=0;const draw=()=>{ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);ctx.restore();p.x+=p.vx;p.y+=p.vy;p.a+=3;if(p.y>cv.height){p.y=-10;p.x=Math.random()*cv.width;}});if(f++<200)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);};draw();
}

// ─── Init ─────────────────────────────────────────────────────
buildSetRow();
startSet();
</script>
